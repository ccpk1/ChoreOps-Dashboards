<#-- ============================================= --#>
<#-- ChoreOps Dashboard Template - ESSENTIAL  --#>
<#-- Template Schema Version: 1                  --#>
<#-- ============================================= --#>
<#--                                             --#>
<#-- Essential dashboard: Welcome + Chores baseline  --#>
<#--                                             --#>
<#-- Injection variables (Python << >>):         --#>
<#--   << user.name >> - User's display name      --#>
<#--   << user.slug >> - URL-safe slug            --#>
<#--                                             --#>
<#-- Snippet tokens: template_snippets.user_setup,                       --#>
<#-- template_snippets.user_validation,                                  --#>
<#-- template_snippets.user_override_helper, template_snippets.meta_stamp --#>
<#-- Stamp format (canonical): META STAMP: {template_id} • {release} • {generated_at} --#>
<#-- Stamp placement: first line inside each card template block after card header comment --#>
<#--                                             --#>
<#-- All HA Jinja2 {{ }} syntax preserved       --#>
<#-- ============================================= --#>

views:
- max_columns: 4
  title: << user.name >> Chores
  path: << user.slug >>
  sections:
    - type: grid
      column_span: 4
      cards:
        - square: false
          type: grid
          columns: 1
          grid_options:
            columns: full
          cards:
            - type: custom:auto-entities
              card:
                square: false
                type: grid
                columns: 1
              card_param: cards
              filter:
                template: |-
                  {#-- ===== WELCOME CARD ===== --#}

                  << template_snippets.meta_stamp >>


                  {#-- 1. User Configuration --#}

                  << template_snippets.user_override_helper >>


                  {#-- 2. Dynamic Lookups & Validations --#}

                  << template_snippets.user_setup >>

                  << template_snippets.user_validation >>

                  {%- if not skip_render -%}

                    {#-- 3. Collect Data --#}
                    {%- set core_sensors = state_attr(dashboard_helper, 'core_sensors') or {} -%}
                    {%- set points_sensor = core_sensors.get('points_eid') -%}
                    {%- set total_sensor = core_sensors.get('chores_eid') -%}
                    {%- set highest_badge_entity = core_sensors.get('badges_eid') -%}
                    {%- set translation_sensor = (state_attr(dashboard_helper, 'dashboard_helpers') or {}).get('translation_sensor_eid') -%}
                    {%- set ui = state_attr(translation_sensor, 'ui_translations') if translation_sensor else {} -%}
                    {%- set points = (states(points_sensor) | int(default=0)) if points_sensor else 0 -%}
                    {%- set points_label = (state_attr(points_sensor, 'unit_of_measurement') if points_sensor else None) or 'Points' -%}
                    {%- set points_icon = (state_attr(points_sensor, 'icon') if points_sensor else None) or 'mdi:star-circle' -%}
                    {%- set weekly_completed = (state_attr(total_sensor, 'chore_stat_approved_week') | int(default=0)) if total_sensor else 0 -%}
                    {%- set todays_completed = (state_attr(total_sensor, 'chore_stat_approved_today') | int(default=0)) if total_sensor else 0 -%}
                    {%- set highest_badge = ((states(highest_badge_entity) if highest_badge_entity else 'None') or 'None') -%}
                    {%- set highest_badge_icon = (state_attr(highest_badge_entity, 'icon') if highest_badge_entity else None) or 'mdi:medal-outline' -%}
                    {%- set points_multiplier = (state_attr(points_sensor, 'points_multiplier') | float(default=1)) if points_sensor else 1 -%}

                    {#-- 4. Build Display - POC-aligned --#}
                    {%- set p_icon = points_icon | default('mdi:star', true) -%}

                    {%- set badge_pill = "" -%}
                    {%- if highest_badge not in ['None', 'unknown', 'Unknown', 'unavailable'] -%}
                      {%- set mult_text = " (x" ~ points_multiplier|string ~ ")" if points_multiplier > 1 else "" -%}
                      {%- set badge_pill =
                        "<div style='margin-top: 6px; font-size: 11px; background: var(--secondary-background-color); padding: 2px 10px; border-radius: 12px; border: 1px solid var(--divider-color); display: inline-flex; align-items: center; justify-content: center;'>"
                        ~ "<ha-icon icon='" ~ highest_badge_icon ~ "' style='width: 16px; height: 12px; margin-right: 4px; color: var(--warning-color);'></ha-icon>"
                        ~ "<span style='font-weight: 600; color: var(--primary-text-color);'>" ~ highest_badge ~ mult_text ~ "</span>"
                        ~ "</div>"
                      -%}
                    {%- endif -%}

                    {%- set left_col =
                      "<div style='text-align: left; flex-grow: 1; padding-right: 12px;'>"
                      ~ "<div style='font-size: 18px; font-weight: 600; margin-bottom: 6px; line-height: 1.2;'>👋 " ~ ui.get('welcome', 'err-welcome') ~ ", " ~ name ~ "!</div>"
                      ~ "<div style='font-size: 13px; color: var(--secondary-text-color); display: flex; flex-wrap: wrap; gap: 8px 16px;'>"
                      ~ "<span style='display: flex; align-items: center;'><ha-icon icon='mdi:calendar-today' style='width: 14px; height: 14px; margin-right: 4px;'></ha-icon>" ~ ui.get('todays_completed', 'err-todays_completed') ~ ": <b style='margin-left: 4px; color: var(--primary-text-color);'>" ~ todays_completed ~ "</b></span>"
                      ~ "<span style='display: flex; align-items: center;'><ha-icon icon='mdi:calendar-week' style='width: 14px; height: 14px; margin-right: 4px;'></ha-icon>" ~ ui.get('weekly_completed', 'err-weekly_completed') ~ ": <b style='margin-left: 4px; color: var(--primary-text-color);'>" ~ weekly_completed ~ "</b></span>"
                      ~ "</div></div>"
                    -%}

                    {%- set right_col =
                      "<div style='text-align: right; flex-shrink: 0; display: flex; flex-direction: column; align-items: flex-end;'>"
                      ~ "<div style='display: flex; align-items: center; color: var(--primary-color); font-size: 18px; font-weight: 800; line-height: 1;'><ha-icon icon='" ~ p_icon ~ "' style='width: 18px; height: 28px; margin-right: 6px;'></ha-icon> " ~ points ~ "</div>"
                      ~ "<div style='font-size: 10px; text-transform: uppercase; font-weight: 700; opacity: 0.6; margin-top: 2px; letter-spacing: 0.5px;'>" ~ points_label ~ "</div>"
                      ~ badge_pill
                      ~ "</div>"
                    -%}

                    {%- set content_html = "<div style='display: flex; justify-content: space-between; align-items: center; width: 100%;'>" ~ left_col ~ right_col ~ "</div>" -%}

                    {#-- 5. Render --#}
                    {{
                      {
                        'type': 'custom:button-card',
                        'entity': points_sensor,
                        'show_name': false,
                        'show_icon': false,
                        'tap_action': {'action': 'more-info'},
                        'styles': {
                          'card': [
                            {'padding': '16px 20px'},
                            {'border-radius': '16px'},
                            {'border': '1px solid var(--divider-color)'},
                            {'background-color': 'var(--card-background-color)'},
                            {'box-shadow': '0px 2px 6px rgba(0,0,0,0.05)'}
                          ],
                          'grid': [
                            {'grid-template-areas': '"content"'},
                            {'grid-template-columns': '1fr'}
                          ],
                          'custom_fields': {
                            'content': [{'width': '100%'}]
                          }
                        },
                        'custom_fields': {
                          'content': content_html
                        }
                      }
                    }},

                  {%- endif -%}
        - type: grid
          square: false
          columns: 1
          grid_options:
            columns: full
          cards:
            - type: custom:auto-entities
              card:
                square: false
                type: grid
                columns: 1
              card_param: cards
              filter:
                template: |-
                  {#-- ===== CHORES CARD ===== --#}

                  << template_snippets.meta_stamp >>


                  {#-- 1. User Configuration --#}

                  << template_snippets.user_override_helper >>

                  {%- set pref_column_count = 3 -%}

                  {%- set pref_use_overdue_grouping = true -%}

                  {%- set pref_use_today_grouping = true -%}

                  {%- set pref_include_daily_recurring_in_today = true -%}

                  {%- set pref_use_this_week_grouping = true -%}

                  {%- set pref_include_weekly_recurring_in_this_week = true -%}

                  {%- set pref_exclude_completed = false -%}

                  {%- set pref_exclude_states = [] -%}  {#-- Example: ['completed', 'completed_by_other', 'not_my_turn', 'missed'] --#}

                  {%- set pref_use_label_grouping = false -%}

                  {%- set pref_exclude_label_list = [] -%}  {#-- Example: ['junk_label', 'skip_this'] --#}

                  {%- set pref_label_display_order = [] -%}  {#-- Example: ['Kitchen', 'Bedroom', 'Outdoor'] --#}

                  {%- set pref_sort_within_groups = 'by_state_and_date' -%}  {#-- Options: 'default', 'name_asc', 'name_desc', 'date_asc', 'date_desc', 'by_state_and_date' --#}


                  {#-- Type coercion for preferences --#}
                  {%- set pref_column_count = pref_column_count | int(default=2) -%}
                  {%- set pref_use_overdue_grouping = (pref_use_overdue_grouping | default('true') | string | lower) == 'true' -%}
                  {%- set pref_use_today_grouping = (pref_use_today_grouping | default('true') | string | lower) == 'true' -%}
                  {%- set pref_include_daily_recurring_in_today = (pref_include_daily_recurring_in_today | default('true') | string | lower) == 'true' -%}
                  {%- set pref_use_this_week_grouping = (pref_use_this_week_grouping | default('true') | string | lower) == 'true' -%}
                  {%- set pref_include_weekly_recurring_in_this_week = (pref_include_weekly_recurring_in_this_week | default('true') | string | lower) == 'true' -%}
                  {%- set pref_exclude_completed = (pref_exclude_completed | default('false') | string | lower) == 'true' -%}
                  {%- set pref_exclude_states = pref_exclude_states if pref_exclude_states is iterable and pref_exclude_states is not string else [] -%}
                  {%- set pref_exclude_states = pref_exclude_states | map('string') | map('lower') | list -%}
                  {%- if pref_exclude_completed and 'completed' not in pref_exclude_states -%}
                    {%- set pref_exclude_states = pref_exclude_states + ['completed'] -%}
                  {%- endif -%}
                  {%- set pref_use_label_grouping = (pref_use_label_grouping | default('false') | string | lower) == 'true' -%}
                  {%- set pref_exclude_label_list = pref_exclude_label_list if pref_exclude_label_list is iterable and pref_exclude_label_list is not string else [] -%}
                  {%- set pref_label_display_order = pref_label_display_order if pref_label_display_order is iterable and pref_label_display_order is not string else [] -%}

                  {#-- 2. Dynamic Lookups & Validations --#}

                  << template_snippets.user_setup >>

                  << template_snippets.user_validation >>

                  {%- if not skip_render -%}

                    {#-- 3. Initialize Variables --#}

                  {%- set ns = namespace(
                    overdue_buttons=[],
                    am_buttons=[],
                    today_buttons=[],
                    this_week_buttons=[],
                    other_buttons=[],
                    label_button_groups=[],
                    label_order=[],
                    group_cards=[]
                  ) -%}

                    {#-- 4. Collect Data --#}
                    {%- set core_sensors = state_attr(dashboard_helper, 'core_sensors') or {} -%}
                    {%- set points_sensor = core_sensors.get('points_eid') -%}
                    {%- set translation_sensor = (state_attr(dashboard_helper, 'dashboard_helpers') or {}).get('translation_sensor_eid') -%}
                    {%- set ui = state_attr(translation_sensor, 'ui_translations') if translation_sensor else {} -%}
                    {%- set points_label = (state_attr(points_sensor, 'unit_of_measurement') if points_sensor else None) or 'Points' -%}
                    {%- set points_icon = (state_attr(points_sensor, 'icon') if points_sensor else None) or 'mdi:star-circle' -%}
                    {%- set chore_list = state_attr(dashboard_helper, 'chores') | default([], true) -%}
                    {%- set chores_by_label_raw = state_attr(dashboard_helper, 'chores_by_label') | default({}, true) -%}

                    {#-- 5. Build Display --#}
                    {%- for chore in chore_list -%}
                      {%- set chore_sensor_id = chore.eid if chore is mapping else chore -%}
                      {%- set chore_status = chore.state if chore is mapping else states(chore_sensor_id) -%}
                      {%- set chore_labels = chore.labels if chore is mapping else state_attr(chore_sensor_id, 'labels') | default([], true) -%}
                      {%- set chore_primary_group = chore.primary_group if chore is mapping else state_attr(chore_sensor_id, 'primary_group') | default('other') -%}
                      {%- set chore_is_today_am = chore.is_today_am if chore is mapping else state_attr(chore_sensor_id, 'is_today_am') -%}

                      {#-- Step 1: Skip if chore labels match exclude list --#}
                      {%- if not (chore_labels | select('in', pref_exclude_label_list) | list | count > 0) -%}

                        {#-- Step 2: Skip chores by excluded states preference --#}
                        {%- if chore_status in pref_exclude_states -%}
                          {#-- Skip this chore --#}

                        {#-- Step 3: Handle overdue chores (highest priority) --#}
                        {%- elif chore_status == 'overdue' and pref_use_overdue_grouping -%}
                          {%- set ns.overdue_buttons = ns.overdue_buttons + [chore_sensor_id] -%}

                        {#-- Step 4: Skip chores with labels when label grouping is enabled (they're processed separately) --#}
                        {%- elif pref_use_label_grouping and (chore_labels | default([], true) | list | length > 0) -%}
                          {#-- Labels take priority; processed in label grouping section below --#}

                        {#-- Step 5: Handle recurring filters BEFORE primary_group logic (override primary_group assignment) --#}
                        {#-- If a chore is in 'today' group without specific date, it's daily recurring --#}
                        {%- elif chore_primary_group == 'today' and not pref_include_daily_recurring_in_today -%}
                          {%- set ns.other_buttons = ns.other_buttons + [chore_sensor_id] -%}

                        {#-- If a chore is in 'this_week' group without specific date, it's weekly recurring --#}
                        {%- elif chore_primary_group == 'this_week' and not pref_include_weekly_recurring_in_this_week -%}
                          {%- set ns.other_buttons = ns.other_buttons + [chore_sensor_id] -%}

                        {#-- Step 6: Categorize by primary_group (time-based) --#}
                        {%- elif chore_primary_group == 'today' and pref_use_today_grouping and chore_is_today_am == true -%}
                          {%- set ns.am_buttons = ns.am_buttons + [chore_sensor_id] -%}

                        {%- elif chore_primary_group == 'today' and pref_use_today_grouping and chore_is_today_am != true -%}
                          {%- set ns.today_buttons = ns.today_buttons + [chore_sensor_id] -%}

                        {%- elif chore_primary_group == 'today' and not pref_use_today_grouping -%}
                          {%- set ns.other_buttons = ns.other_buttons + [chore_sensor_id] -%}

                        {%- elif chore_primary_group == 'this_week' and pref_use_this_week_grouping -%}
                          {%- set ns.this_week_buttons = ns.this_week_buttons + [chore_sensor_id] -%}

                        {%- elif chore_primary_group == 'this_week' and not pref_use_this_week_grouping -%}
                          {%- set ns.other_buttons = ns.other_buttons + [chore_sensor_id] -%}

                        {#-- Step 7: Default fallback --#}
                        {%- else -%}
                          {%- set ns.other_buttons = ns.other_buttons + [chore_sensor_id] -%}
                        {%- endif -%}

                      {%- endif -%}
                    {%- endfor -%}

                    {#-- Build Label Groups from chores_by_label --#}
                    {%- if pref_use_label_grouping -%}
                      {#-- Determine label order: use pref_label_display_order if provided, else all labels alphabetically --#}
                      {%- if pref_label_display_order | length > 0 -%}
                        {%- set ns.label_order = pref_label_display_order -%}
                      {%- else -%}
                        {%- set ns.label_order = chores_by_label_raw.keys() | list | sort -%}
                      {%- endif -%}

                      {#-- Build label button groups in order --#}
                      {%- for label in ns.label_order -%}
                        {%- if label not in pref_exclude_label_list and label in chores_by_label_raw -%}
                          {%- set label_eids = chores_by_label_raw[label] | default([], true) -%}
                          {%- set ns.temp_label_buttons = [] -%}
                          {%- for eid in label_eids -%}
                            {%- if eid not in (ns.overdue_buttons | list) -%}
                              {%- set ns.temp_label_buttons = ns.temp_label_buttons + [eid] -%}
                            {%- endif -%}
                          {%- endfor -%}
                          {%- if ns.temp_label_buttons | length > 0 -%}
                            {%- set ns.label_button_groups = ns.label_button_groups + [{'name': label, 'buttons': ns.temp_label_buttons, 'icon': 'mdi:label'}] -%}
                          {%- endif -%}
                        {%- endif -%}
                      {%- endfor -%}

                      {#-- Add any remaining labels not in pref_label_display_order (alphabetically sorted) --#}
                      {%- if pref_label_display_order | length > 0 -%}
                        {%- set remaining_labels = chores_by_label_raw.keys() | list | sort | reject('in', pref_label_display_order) | list -%}
                        {%- for label in remaining_labels -%}
                          {%- if label not in pref_exclude_label_list -%}
                            {%- set label_eids = chores_by_label_raw[label] | default([], true) -%}
                            {%- set ns.temp_label_buttons = [] -%}
                            {%- for eid in label_eids -%}
                              {%- if eid not in (ns.overdue_buttons | list) -%}
                                {%- set ns.temp_label_buttons = ns.temp_label_buttons + [eid] -%}
                              {%- endif -%}
                            {%- endfor -%}
                            {%- if ns.temp_label_buttons | length > 0 -%}
                              {%- set ns.label_button_groups = ns.label_button_groups + [{'name': label, 'buttons': ns.temp_label_buttons, 'icon': 'mdi:label'}] -%}
                            {%- endif -%}
                          {%- endif -%}
                        {%- endfor -%}
                      {%- endif -%}
                    {%- endif -%}

                    {#-- Build the button groups --#}
                    {%- set button_groups = [
                        {'name': "!!!!!!!!!!! " ~ ui.get('overdue', 'err-overdue') ~ " !!!!!!!!!!!", 'buttons': ns.overdue_buttons, 'icon': 'mdi:alert-octagon'},
                        {'name': ui.get('due_this_morning', 'err-due_this_morning'), 'buttons': ns.am_buttons, 'icon': 'mdi:alarm'},
                        {'name': ui.get('due_today', 'err-due_today'), 'buttons': ns.today_buttons, 'icon': 'mdi:calendar-today'},
                        {'name': ui.get('due_this_week', 'err-due_this_week'), 'buttons': ns.this_week_buttons, 'icon': 'mdi:calendar-week'}
                    ] -%}

                    {#-- Insert label-based groups --#}
                    {%- set button_groups = button_groups + ns.label_button_groups -%}

                    {#-- Continue with bonus group --#}
                    {%- set button_groups = button_groups + [
                        {'name': ui.get('upcoming_bonus', 'err-upcoming_bonus'), 'buttons': ns.other_buttons, 'icon': 'mdi:calendar-clock'}
                    ] -%}

                    {#-- Sort chores within each group based on preference --#}
                    {%- if pref_sort_within_groups != 'default' -%}
                      {%- set ns.sorted_groups = [] -%}
                      {%- for group in button_groups -%}
                        {%- if group.buttons | length > 0 -%}
                          {%- if pref_sort_within_groups in ['name_asc', 'name_desc'] -%}
                            {#-- Build list of (name, eid) tuples for sorting --#}
                            {%- set ns.temp_list = [] -%}
                            {%- for eid in group.buttons -%}
                              {%- set chore_name = state_attr(eid, 'chore_name') | default('zzz', true) | lower -%}
                              {%- set ns.temp_list = ns.temp_list + [[chore_name, eid]] -%}
                            {%- endfor -%}
                            {#-- Sort the list --#}
                            {%- set sorted_list = ns.temp_list | sort -%}
                            {%- if pref_sort_within_groups == 'name_desc' -%}
                              {%- set sorted_list = sorted_list | reverse | list -%}
                            {%- endif -%}
                            {#-- Extract just the entity IDs --#}
                            {%- set sorted_buttons = sorted_list | map('last') | list -%}
                            {%- set ns.sorted_groups = ns.sorted_groups + [{'name': group.name, 'buttons': sorted_buttons, 'icon': group.icon}] -%}
                          {%- elif pref_sort_within_groups in ['date_asc', 'date_desc'] -%}
                            {#-- Build list of (due_date_timestamp, eid) tuples for sorting --#}
                            {%- set ns.temp_list = [] -%}
                            {%- for eid in group.buttons -%}
                              {%- set due_date_str = state_attr(eid, 'due_date') | string -%}
                              {%- if due_date_str not in ['None', 'unknown', 'unavailable'] -%}
                                {%- set due_timestamp = as_timestamp(due_date_str) | default(9999999999, true) -%}
                              {%- else -%}
                                {%- set due_timestamp = 9999999999 -%}
                              {%- endif -%}
                              {%- set ns.temp_list = ns.temp_list + [[due_timestamp, eid]] -%}
                            {%- endfor -%}
                            {#-- Sort the list --#}
                            {%- set sorted_list = ns.temp_list | sort -%}
                            {%- if pref_sort_within_groups == 'date_desc' -%}
                              {%- set sorted_list = sorted_list | reverse | list -%}
                            {%- endif -%}
                            {#-- Extract just the entity IDs --#}
                            {%- set sorted_buttons = sorted_list | map('last') | list -%}
                            {%- set ns.sorted_groups = ns.sorted_groups + [{'name': group.name, 'buttons': sorted_buttons, 'icon': group.icon}] -%}
                          {%- elif pref_sort_within_groups == 'by_state_and_date' -%}
                            {#-- Actionability sort: overdue, due, pending, waiting, claimed, completed, completed_by_other, not_my_turn, missed --#}
                            {%- set ns.temp_list = [] -%}
                            {%- for eid in group.buttons -%}
                              {%- set chore_state = states(eid) | string | lower -%}
                              {%- if chore_state == 'overdue' -%}
                                {%- set state_priority = 0 -%}
                              {%- elif chore_state == 'due' -%}
                                {%- set state_priority = 1 -%}
                              {%- elif chore_state == 'pending' -%}
                                {%- set state_priority = 2 -%}
                              {%- elif chore_state == 'waiting' -%}
                                {%- set state_priority = 3 -%}
                              {%- elif chore_state == 'claimed' -%}
                                {%- set state_priority = 4 -%}
                              {%- elif chore_state in ['completed', 'approved'] -%}
                                {%- set state_priority = 5 -%}
                              {%- elif chore_state == 'completed_by_other' -%}
                                {%- set state_priority = 6 -%}
                              {%- elif chore_state == 'not_my_turn' -%}
                                {%- set state_priority = 7 -%}
                              {%- elif chore_state == 'missed' -%}
                                {%- set state_priority = 8 -%}
                              {%- else -%}
                                {%- set state_priority = 50 -%}
                              {%- endif -%}
                              {%- set due_date_str = state_attr(eid, 'due_date') | string -%}
                              {%- if due_date_str not in ['None', 'unknown', 'unavailable'] -%}
                                {%- set due_timestamp = as_timestamp(due_date_str) | default(9999999999, true) -%}
                              {%- else -%}
                                {%- set due_timestamp = 9999999999 -%}
                              {%- endif -%}
                              {%- set chore_name = state_attr(eid, 'chore_name') | default('zzz', true) | lower -%}
                              {%- set ns.temp_list = ns.temp_list + [[state_priority, due_timestamp, chore_name, eid]] -%}
                            {%- endfor -%}
                            {%- set sorted_list = ns.temp_list | sort -%}
                            {%- set sorted_buttons = sorted_list | map('last') | list -%}
                            {%- set ns.sorted_groups = ns.sorted_groups + [{'name': group.name, 'buttons': sorted_buttons, 'icon': group.icon}] -%}
                          {%- else -%}
                            {%- set ns.sorted_groups = ns.sorted_groups + [group] -%}
                          {%- endif -%}
                        {%- else -%}
                          {%- set ns.sorted_groups = ns.sorted_groups + [group] -%}
                        {%- endif -%}
                      {%- endfor -%}
                      {%- set button_groups = ns.sorted_groups -%}
                    {%- endif -%}

                    {#-- 6. Render (POC-aligned button-card layout) --#}
                    {{
                      {
                        'type': 'custom:button-card',
                        'name': ui.get('chores', 'err-chores'),
                        'icon': 'mdi:broom',
                        'show_name': true,
                        'show_icon': true,
                        'styles': {
                          'card': [
                            {'background': 'transparent'},
                            {'box-shadow': 'none'},
                            {'border': 'none'},
                            {'padding': '0px 0px 2px 0px'},
                            {'min-height': 'unset'},
                            {'margin-bottom': '-10px'}
                          ],
                          'grid': [
                            {'grid-template-areas': '"i n"'},
                            {'grid-template-columns': 'min-content 1fr'},
                            {'gap': '1px'},
                            {'align-items': 'center'}
                          ],
                          'icon': [
                            {'width': '22px'},
                            {'color': 'var(--primary-color)'}
                          ],
                          'name': [
                            {'justify-self': 'start'},
                            {'font-size': '20px'},
                            {'font-weight': 'bold'},
                            {'color': 'var(--primary-text-color)'}
                          ]
                        }
                      }
                    }},

                    {%- for group in button_groups -%}
                      {%- set ns.group_cards = [] -%}
                      {%- if group.buttons | length > 0 -%}
                        {%- set g_name = group.name | replace('!!!!!!!!!!! ', '') | replace(' !!!!!!!!!!!', '') -%}
                        {%- set is_overdue = 'alert' in group.icon or 'overdue' in g_name | lower -%}

                        {{
                          {
                            'type': 'custom:button-card',
                            'name': g_name,
                            'icon': group.icon,
                            'show_name': true,
                            'show_icon': true,
                            'styles': {
                              'card': [
                                {'background': 'rgba(244, 67, 54, 0.1)' if is_overdue else 'var(--secondary-background-color)'},
                                {'box-shadow': 'none'},
                                {'border': '2px solid rgba(244, 67, 54, 0.3)' if is_overdue else '2px solid var(--divider-color)'},
                                {'border-radius': '6px'},
                                {'padding': '6px 16px'},
                                {'min-height': 'unset'},
                                {'margin': '0px 0px 0px 0px'}
                              ],
                              'grid': [
                                {'grid-template-areas': '"i n"'},
                                {'grid-template-columns': 'min-content 1fr'},
                                {'gap': '0px'},
                                {'align-items': 'center'}
                              ],
                              'icon': [
                                {'width': '18px'},
                                {'color': 'var(--error-color)' if is_overdue else 'var(--primary-color)'}
                              ],
                              'name': [
                                {'justify-self': 'right'},
                                {'font-size': '12px'},
                                {'font-weight': '800'},
                                {'text-transform': 'uppercase'},
                                {'letter-spacing': '0.9px'},
                                {'color': 'var(--error-color)' if is_overdue else 'var(--primary-text-color)'}
                              ]
                            }
                          }
                        }},

                        {%- for chore_sensor_id in group.buttons -%}
                            {%- set state_map = {
                              'pending': ui.get('pending', 'err-pending'),
                              'due': ui.get('due', 'err-due'),
                              'claimed': ui.get('claimed', 'err-claimed'),
                              'completed': ui.get('completed', 'err-completed'),
                              'approved': ui.get('completed', 'err-completed'),
                              'overdue': ui.get('overdue', 'err-overdue'),
                              'waiting': ui.get('waiting', 'err-waiting'),
                              'missed': ui.get('missed', 'err-missed'),
                              'already_approved': ui.get('already_approved', 'err-already_approved'),
                              'pending_claim': ui.get('pending_claim', 'err-pending_claim'),
                              'missed_locked': ui.get('missed_locked', 'err-missed_locked'),
                              'completed_by_other': ui.get('completed_by_other', 'err-completed_by_other'),
                              'not_my_turn': ui.get('not_my_turn', 'err-not_my_turn'),
                              'independent': ui.get('independent', 'err-independent'),
                              'shared_all': ui.get('shared_all', 'err-shared_all'),
                              'shared_first': ui.get('shared_first', 'err-shared_first')
                          } -%}

                          {%- set ns.group_cards = ns.group_cards + [{
                              'type': 'custom:button-card',
                              'entity': chore_sensor_id,
                              'show_name': true,
                              'show_icon': true,
                              'tap_action': {'action': 'more-info'},
                              'name': "[[[ let name = entity.attributes.chore_name; let type = entity.attributes.completion_criteria; let badge = ''; if (type === 'shared_all') { let assignedRaw = entity.attributes.assigned_user_names; let completedRaw = entity.attributes.completed_by; let assigned = Array.isArray(assignedRaw) ? assignedRaw.filter(Boolean) : []; let completed = Array.isArray(completedRaw) ? completedRaw.filter(Boolean) : (completedRaw ? [completedRaw] : []); let allDone = assigned.length > 0 && completed.length >= assigned.length; let badgeColor = allDone ? 'var(--success-color)' : 'var(--disabled-text-color)'; badge = `<ha-icon icon=\"mdi:account-group\" style=\"width: 16px; height: 16px; color: ${badgeColor}; margin-left: 8px; margin-bottom: 4px;\"></ha-icon>`; } if (type === 'shared_first') badge = '<ha-icon icon=\"mdi:flag-checkered\" style=\"width: 16px; height: 16px; color: var(--disabled-text-color); margin-left: 8px; margin-bottom: 4px;\"></ha-icon>'; if (type && type.includes('rotation')) badge = '<ha-icon icon=\"mdi:account-sync\" style=\"width: 16px; height: 16px; color: var(--disabled-text-color); margin-left: 8px; margin-bottom: 4px;\"></ha-icon>'; return `${name}${badge}`; ]]]",
                              'icon': "[[[ return entity.attributes.icon || 'mdi:broom'; ]]]",
                              'styles': {
                                'card': [
                                  {'padding': '6px 8px'},
                                  {'border-radius': '10px'},
                                  {'opacity': "[[[ const canClaim = entity.attributes.can_claim === true; const claimBlocked = !canClaim && entity.state !== 'claimed'; return claimBlocked ? '0.6' : '1.0'; ]]]"},
                                  {'border-left': "[[[ if (['overdue', 'missed'].includes(entity.state)) return '4px solid #ff4444'; if (entity.state === 'due') return '4px solid #ff9800'; return '4px solid transparent'; ]]]"}
                                ],
                                'grid': [
                                  {'grid-template-areas': '"i n btn_undo btn_action" "i due btn_undo btn_action" "i history btn_undo btn_action"'},
                                  {'grid-template-columns': '30px 1fr min-content min-content'},
                                  {'grid-template-rows': 'min-content min-content min-content'},
                                  {'row-gap': '0px'},
                                  {'column-gap': '8px'},
                                  {'align-items': 'center'}
                                ],
                                'name': [
                                  {'justify-self': 'start'},
                                  {'font-weight': '600'},
                                  {'font-size': '14px'},
                                  {'margin-bottom': '2px'},
                                  {'display': 'flex'},
                                  {'align-items': 'center'},
                                  {'line-height': '1.2'}
                                ],
                                'icon': [
                                  {'width': '28px'},
                                  {'align-self': 'center'},
                                  {'margin-top': '0px'},
                                  {'color': "[[[ if (['overdue', 'missed'].includes(entity.state)) return '#ff4444'; if (entity.state === 'due') return '#ff9800'; if (entity.state === 'claimed') return '#a957fa'; if (entity.state === 'completed') return 'var(--success-color)'; return 'var(--primary-text-color)'; ]]]"}
                                ],
                                'custom_fields': {
                                  'due': [
                                    {'justify-self': 'start'},
                                    {'font-size': '11px'},
                                    {'font-weight': '400'},
                                    {'line-height': '1.2'},
                                    {'margin-bottom': '1px'},
                                    {'color': "[[[ if (['overdue', 'missed'].includes(entity.state)) return '#ff4444'; if (entity.state === 'due') return '#ff9800'; return 'var(--primary-text-color)'; ]]]"}
                                  ],
                                  'history': [
                                    {'justify-self': 'start'},
                                    {'font-size': '10px'},
                                    {'line-height': '1.2'},
                                    {'color': 'var(--secondary-text-color)'}
                                  ],
                                  'btn_undo': [
                                    {'align-self': 'center'},
                                    {'justify-self': 'end'},
                                    {'margin-right': '8px'},
                                    {'display': "[[[ return entity.state === 'claimed' ? 'block' : 'none'; ]]]"}
                                  ],
                                  'btn_action': [
                                    {'align-self': 'center'},
                                    {'justify-self': 'end'}
                                  ]
                                }
                              },
                              'custom_fields': {
                                'due': "[[[ const map = " ~ state_map | tojson ~ "; let s = entity.state; const br = entity.attributes.block_reason || null; const dueLbl = " ~ (ui.get('due_date', 'err-due_date') | tojson) ~ "; if (!['pending','due','claimed','completed','overdue'].includes(s) && entity.attributes.can_claim === false && br) s = br; s = map[s] || s; const due = entity.attributes.due_date; const dText = due ? new Date(due).toLocaleString(undefined, {month:'short', day:'numeric', hour:'numeric', minute:'2-digit'}) : '--'; return `<b>${String(s).toUpperCase()}</b> • ${dueLbl}: ${dText}`; ]]]",
                                'history': "[[[ const map = " ~ state_map | tojson ~ "; const state = entity.state; const type = entity.attributes.completion_criteria || ''; const assignedRaw = entity.attributes.assigned_user_names; const completedRaw = entity.attributes.completed_by; const assigned = Array.isArray(assignedRaw) ? assignedRaw.filter(Boolean) : []; const completed = Array.isArray(completedRaw) ? completedRaw.filter(Boolean) : (completedRaw ? [completedRaw] : []); const br = entity.attributes.block_reason || null; const progressLbl = " ~ (ui.get('progress', 'err-progress') | tojson) ~ "; const doneLbl = " ~ (ui.get('done', 'err-done') | tojson) ~ "; const byLbl = " ~ (ui.get('by', 'err-by') | tojson) ~ "; const completedByLbl = " ~ (ui.get('completed_by', 'err-completed_by') | tojson) ~ "; const completedLbl = " ~ (ui.get('completed', 'err-completed') | tojson) ~ "; const currentlyLbl = " ~ (ui.get('currently', 'err-currently') | tojson) ~ "; const lastLbl = " ~ (ui.get('last', 'err-last') | tojson) ~ "; const neverLbl = " ~ (ui.get('never', 'err-never') | tojson) ~ "; let context = ''; if (type === 'shared_all' && assigned.length > 0) { const c = completed.length; const a = assigned.length; const p = Math.max(0, Math.min(100, Math.round((c / a) * 100))); const prefix = p >= 100 ? `${completedLbl}: ${c}/${a}` : `${progressLbl}: ${c}/${a} ${doneLbl}`; const who = c > 0 ? ` ${byLbl} ${completed.join(', ')}` : ''; context = `${prefix}${who}  •  `; } else if (type === 'shared_first' && completed.length > 0) { context = `${completedByLbl}: ${completed[0]}  •  `; } else if (state === 'not_my_turn' && entity.attributes.turn_user_name) { context = `${currentlyLbl}: ${entity.attributes.turn_user_name}  •  `; } else if (state === 'completed_by_other' && completed.length > 0) { context = `${completedByLbl}: ${completed.join(', ')}  •  `; } else if (entity.attributes.can_claim === false && br) { context = `${map[br] || br}  •  `; } const last = entity.attributes.last_completed; const lText = last ? new Date(last).toLocaleDateString(undefined, {month:'short', day:'numeric'}) : neverLbl; const freq = entity.attributes.recurring_frequency; const rText = freq ? `  •  <ha-icon icon=\\\"mdi:repeat\\\" style=\\\"width:10px;height:10px;\\\"></ha-icon> ${freq.charAt(0).toUpperCase() + freq.slice(1)}` : ''; return `${context}${lastLbl}: ${lText}${rText}`; ]]]",
                                'btn_undo': {
                                  'card': {
                                    'type': 'custom:button-card',
                                    'entity': chore_sensor_id,
                                    'icon': 'mdi:undo',
                                    'show_name': false,
                                    'show_icon': true,
                                    'styles': {
                                      'card': [
                                        {'width': '34px'},
                                        {'height': '34px'},
                                        {'border-radius': '50%'},
                                        {'background-color': 'transparent'},
                                        {'border': '1px solid var(--divider-color)'},
                                        {'box-shadow': 'none'}
                                      ],
                                      'icon': [
                                        {'width': '20px'},
                                        {'color': 'var(--secondary-text-color)'}
                                      ]
                                    },
                                    'tap_action': {
                                      'action': 'call-service',
                                      'service': 'button.press',
                                      'service_data': {
                                        'entity_id': "[[[ return entity.attributes.disapprove_button_eid; ]]]"
                                      }
                                    }
                                  }
                                },
                                'btn_action': {
                                  'card': {
                                    'type': 'custom:button-card',
                                    'entity': chore_sensor_id,
                                    'show_name': false,
                                    'show_icon': true,
                                    'icon': "[[[ let s = entity.state; let canClaim = entity.attributes.can_claim === true; let blockReason = entity.attributes.block_reason || null; let blockReasonIconMap = { completed_by_other: 'mdi:account-check-outline', already_approved: 'mdi:check', pending_claim: 'mdi:progress-check', waiting: 'mdi:clock-outline', not_my_turn: 'mdi:account-lock-outline', missed_locked: 'mdi:lock-outline' }; if (s === 'claimed') return 'mdi:check-all'; if (s === 'completed') return 'mdi:check'; if (!canClaim && blockReason && s !== 'claimed') return blockReasonIconMap[blockReason] || 'mdi:lock-outline'; if (s === 'overdue') return 'mdi:alert-octagon'; return 'mdi:arrow-right'; ]]]",
                                    'styles': {
                                      'card': [
                                        {'width': '34px'},
                                        {'height': '34px'},
                                        {'border-radius': '50%'},
                                        {'background-color': "[[[ return entity.state === 'claimed' ? '#a957fa' : 'transparent'; ]]]"},
                                        {'color': "[[[ if (entity.state === 'claimed') return '#ffffff'; if (entity.state === 'completed' || entity.attributes.can_claim !== true) return 'var(--disabled-text-color)'; return 'var(--primary-color)'; ]]]"},
                                        {'border': "[[[ if (entity.state === 'claimed' || entity.state === 'completed') return '1px solid transparent'; return entity.attributes.can_claim === true ? '2px solid var(--primary-color)' : '1px solid var(--disabled-text-color)'; ]]]"},
                                        {'box-shadow': "[[[ return (entity.attributes.can_claim === true && entity.state !== 'completed') ? '0px 2px 4px rgba(0,0,0,0.1)' : 'none'; ]]]"}
                                      ],
                                      'icon': [
                                        {'width': '20px'},
                                        {'margin-left': "[[[ if (entity.state === 'claimed' || entity.state === 'completed') return '0px'; return '1px'; ]]]"}
                                      ]
                                    },
                                    'tap_action': {
                                      'action': "[[[ let canClaim = entity.attributes.can_claim === true; if ((!canClaim && entity.state !== 'claimed') || entity.state === 'completed') return 'none'; return 'call-service'; ]]]",
                                      'service': 'button.press',
                                      'service_data': {
                                        'entity_id': "[[[ if (entity.state === 'claimed') return entity.attributes.approve_button_eid; return entity.attributes.claim_button_eid; ]]]"
                                      }
                                    }
                                  }
                                }
                              }
                          }] -%}
                        {%- endfor -%}

                        {{
                          {
                            'type': 'grid',
                            'columns': pref_column_count,
                            'square': false,
                            'cards': ns.group_cards
                          }
                        }},
                      {%- endif -%}
                    {%- endfor -%}
                  {%- endif -%}
