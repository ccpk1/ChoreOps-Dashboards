<#-- ============================================= --#>
<#-- ChoreOps Dashboard Template - ADMIN      --#>
<#-- Template Schema Version: 1                  --#>
<#-- ============================================= --#>
<#--                                             --#>
<#-- Admin dashboard: Shared approval board      --#>
<#-- Uses integration.entry_id injection for     --#>
<#-- instance-safe helper lookup                 --#>
<#--                                             --#>
<#-- Snippet tokens: template_snippets.admin_setup_shared,               --#>
<#-- template_snippets.admin_validation_missing_selector,                --#>
<#-- template_snippets.user_override_helper, template_snippets.meta_stamp --#>
<#-- Stamp format (canonical): META STAMP: {template_id} • {release} • {generated_at} --#>
<#-- Stamp placement: first line inside each card template block after card header comment --#>
<#--                                             --#>
<#-- All HA Jinja2 {{ }} syntax preserved       --#>
<#-- ============================================= --#>

views:
- title: ChoreOps Admin
  path: admin
  sections:
    - type: grid
      cards:
        - type: custom:auto-entities
          card:
            type: grid
            square: false
            columns: 1
          card_param: cards
          filter:
            template: |-
              {#-- ===== APPROVAL BOARD ===== --#}

              << template_snippets.meta_stamp >>


              {#-- 1. User Configuration --#}

              << template_snippets.user_override_helper >>

              {%- set pref_ui_control_key_root = 'admin-shared/approval-center' -%}

              {%- set pref_default_header_collapsed = false -%}

              {%- set pref_primary_tint_mix_pct = 14 -%}

              {%- set pref_show_header_background = true -%}

              {%- set pref_show_header_thin_border = true -%}

              {#-- 2. Dynamic Lookups & Validations --#}

              << template_snippets.admin_setup_shared >>

              << template_snippets.admin_validation_missing_selector >>

              {%- set pref_ui_control_key_root = (pref_ui_control_key_root | default('admin-shared/approval-center') | string) -%}
              {%- set pref_ui_control_key_root_segments = pref_ui_control_key_root.split('/') | reject('equalto', '') | list -%}
              {%- if pref_ui_control_key_root_segments | length == 0 -%}
                {%- set pref_ui_control_key_root_segments = ['admin-shared', 'approval-center'] -%}
              {%- endif -%}
              {%- set pref_ui_control_key_root = pref_ui_control_key_root_segments | join('/') -%}
              {%- set pref_default_header_collapsed = (pref_default_header_collapsed | default('false') | string | lower) == 'true' -%}
              {%- set pref_primary_tint_mix_pct = pref_primary_tint_mix_pct | int(default=14) -%}
              {%- set pref_show_header_background = (pref_show_header_background | default('true') | string | lower) == 'true' -%}
              {%- set pref_show_header_thin_border = (pref_show_header_thin_border | default('true') | string | lower) == 'true' -%}
              {%- if pref_primary_tint_mix_pct < 0 -%}
                {%- set pref_primary_tint_mix_pct = 0 -%}
              {%- elif pref_primary_tint_mix_pct > 100 -%}
                {%- set pref_primary_tint_mix_pct = 100 -%}
              {%- endif -%}

              {%- if not skip_render -%}

                {#-- 3. Initialize Variables --#}

                {%- set helper_sensor_entities = integration_entities('choreops')
                    | select('search', '^sensor\\.')
                    | list
                    | expand
                    | selectattr('attributes.purpose', 'defined')
                    | selectattr('attributes.purpose', 'eq', 'purpose_dashboard_helper')
                    | selectattr('attributes.integration_entry_id', 'eq', entry_id)
                    | sort(attribute='attributes.user_name')
                    | list -%}
                {%- set ns = namespace(
                  lanes=[],
                  total_chore_pending=0,
                  total_reward_pending=0,
                  pending_user_count=0,
                  summary_helper=''
                ) -%}
                {%- if helper_sensor_entities | count > 0 -%}
                  {%- set ns.summary_helper = helper_sensor_entities[0].entity_id -%}
                {%- else -%}
                  {{ {
                    'type': 'markdown',
                    'content': "⚠️ **Dashboard Configuration Error**\n\nCannot find any dashboard helper entities for this shared admin view.\n\nCheck Settings → Integrations → ChoreOps and verify at least one user is configured."
                  } }},
                  {%- set skip_render = true -%}
                {%- endif -%}
              {%- endif -%}

              {%- if not skip_render -%}

                {#-- 4. Collect Data --#}

                {%- set ui = {} -%}
                {%- if ns.summary_helper not in ['', None, 'None'] -%}
                  {%- set translation_sensor = (state_attr(ns.summary_helper, 'dashboard_helpers') or {}).get('translation_sensor_eid') -%}
                  {%- set ui = state_attr(translation_sensor, 'ui_translations') if translation_sensor else {} -%}
                {%- endif -%}
                {%- set integration_entry_id = state_attr(ns.summary_helper, 'integration_entry_id') if ns.summary_helper not in ['', None, 'None'] else '' -%}
                {%- set dashboard_helper_user_id = state_attr(ns.summary_helper, 'user_id') if ns.summary_helper not in ['', None, 'None'] else '' -%}
                {%- set ui_control = state_attr(ns.summary_helper, 'ui_control') | default({}, true) if ns.summary_helper not in ['', None, 'None'] else {} -%}
                {%- set ui_control_key_root = pref_ui_control_key_root -%}
                {%- set ui_control_key_header_collapsed = ui_control_key_root ~ '/header-collapse' -%}
                {%- set ui_root = namespace(current=ui_control if ui_control is mapping else {}) -%}
                {%- for segment in ui_control_key_root.split('/') -%}
                  {%- if ui_root.current is mapping -%}
                    {%- set ui_root.current = ui_root.current.get(segment, {}) -%}
                  {%- else -%}
                    {%- set ui_root.current = {} -%}
                  {%- endif -%}
                {%- endfor -%}
                {%- set has_header_collapsed_override = ui_root.current is mapping and 'header-collapse' in ui_root.current -%}

                {#-- 5. Build Display --#}

                {%- for helper_state in helper_sensor_entities -%}
                {%- set helper_entity_id = helper_state.entity_id -%}
                {%- set helper_attrs = helper_state.attributes -%}
                {%- set helper_name = helper_attrs.user_name | default(helper_state.name, true) -%}
                {%- set dashboard_helpers = helper_attrs.dashboard_helpers | default({}, true) -%}
                {%- set translation_sensor = dashboard_helpers.get('translation_sensor_eid') -%}
                {%- set helper_ui = state_attr(translation_sensor, 'ui_translations') if translation_sensor else ui -%}
                {%- set pending_approvals = helper_attrs.pending_approvals | default({}, true) -%}
                {%- set pending_chore_data = pending_approvals.get('chores', []) | default([], true) -%}
                {%- set pending_reward_data = pending_approvals.get('rewards', []) | default([], true) -%}
                {%- set helper_chore_items = helper_attrs.chores | default([], true) -%}
                {%- set helper_reward_items = helper_attrs.rewards | default([], true) -%}
                {%- set chore_count = pending_chore_data | count -%}
                {%- set reward_count = pending_reward_data | count -%}
                {%- set total_count = chore_count + reward_count -%}
                {%- if total_count > 0 -%}
                  {%- set ns.total_chore_pending = ns.total_chore_pending + chore_count -%}
                  {%- set ns.total_reward_pending = ns.total_reward_pending + reward_count -%}
                  {%- set ns.pending_user_count = ns.pending_user_count + 1 -%}
                  {%- set combined_summary = "<div style='display:flex;flex-direction:column;align-items:flex-end;justify-content:center;line-height:1;'><span style='font-size:22px;font-weight:800;'>" ~ total_count ~ "</span><span style='margin-top:4px;font-size:10px;text-transform:uppercase;letter-spacing:0.06em;color:var(--secondary-text-color);'>" ~ helper_ui.get('approvals', 'err-approvals') ~ "</span></div>" -%}
                  {%- set header_card = {
                    'type': 'custom:button-card',
                    'entity': helper_entity_id,
                    'show_name': True,
                    'show_label': False,
                    'show_state': False,
                    'show_icon': True,
                    'icon': 'mdi:account-circle',
                    'icon_color': '#A957FA',
                    'name': helper_name,
                    'tap_action': {'action': 'none'},
                    'hold_action': {'action': 'more-info'},
                    'custom_fields': {
                      'approval_count': combined_summary
                    },
                    'styles': {
                      'card': [
                        {'padding': '10px 2px 2px 2px'},
                        {'border-radius': '0'},
                        {'box-shadow': 'none'},
                        {'border': 'none'},
                        {'background': 'transparent'},
                        {'margin-top': '14px'},
                        {'margin-bottom': '4px'}
                      ],
                      'grid': [
                        {'grid-template-areas': '"i n approval_count" "i n approval_count"'},
                        {'grid-template-columns': '30px minmax(0, 1fr) auto'},
                        {'grid-template-rows': 'min-content min-content'},
                        {'column-gap': '12px'},
                        {'row-gap': '2px'},
                        {'align-items': 'center'}
                      ],
                      'name': [
                        {'justify-self': 'start'},
                        {'align-self': 'center'},
                        {'font-size': '22px'},
                        {'font-weight': '800'},
                        {'line-height': '1.2'}
                      ],
                      'icon': [
                        {'width': '20px'},
                        {'height': '20px'},
                        {'color': 'var(--primary-text-color)'},
                        {'align-self': 'center'}
                      ],
                      'custom_fields': {
                        'approval_count': [
                          {'justify-self': 'end'},
                          {'text-align': 'right'},
                          {'line-height': '1'},
                          {'white-space': 'nowrap'},
                          {'padding': '4px 0 0 0'}
                        ]
                      }
                    }
                  } -%}
                  {%- set row_ns = namespace(cards=[]) -%}
                  {%- for entry in pending_chore_data -%}
                    {%- set approve_eid = (entry.approve_button_eid if entry.approve_button_eid not in [None, 'None', ''] else '') | default('') -%}
                    {%- set return_eid = (entry.disapprove_button_eid if entry.disapprove_button_eid not in [None, 'None', ''] else '') | default('') -%}
                    {%- set chore_match = helper_chore_items | selectattr('name', 'eq', entry.chore_name) | list -%}
                    {%- set chore_eid = chore_match[0].eid if chore_match | count > 0 else '' -%}
                    {%- set item_icon = (state_attr(chore_eid, 'icon') if chore_eid not in ['', None, 'None'] else None) or 'mdi:broom' -%}
                    {%- set claimed_at_iso = state_attr(chore_eid, 'last_claimed') if chore_eid not in ['', None, 'None'] else None -%}
                    {%- set last_completed_iso = state_attr(chore_eid, 'last_completed') if chore_eid not in ['', None, 'None'] else None -%}
                    {%- set claimed_at_display = (as_timestamp(claimed_at_iso) | timestamp_custom('%Y-%m-%d %-I:%M%p', true)) if claimed_at_iso not in ['', None, 'None'] else '' -%}
                    {%- set last_completed_display = (as_timestamp(last_completed_iso) | timestamp_custom('%Y-%m-%d', true)) if last_completed_iso not in ['', None, 'None'] else '' -%}
                    {%- set meta_text = helper_ui.get('chore_claimed', 'err-chore_claimed') ~ ': ' ~ claimed_at_display if claimed_at_display != '' else helper_ui.get('chore', 'err-chore') -%}
                    {%- if last_completed_display != '' -%}
                      {%- set meta_text = meta_text ~ ' • ' ~ helper_ui.get('last', 'err-last') ~ ': ' ~ last_completed_display -%}
                    {%- endif -%}
                    {%- if approve_eid != '' or return_eid != '' -%}
                      {%- set row_ns.cards = row_ns.cards + [{
                        'type': 'custom:button-card',
                        'entity': approve_eid if approve_eid != '' else return_eid,
                        'show_name': False,
                        'show_icon': False,
                        'show_label': False,
                        'show_state': False,
                        'tap_action': {'action': 'none'},
                        'hold_action': {'action': 'more-info'},
                        'styles': {
                          'card': [
                            {'padding': '9px 12px'},
                            {'border-radius': '14px'},
                            {'box-shadow': 'none'},
                            {'border': '1px solid color-mix(in srgb, #A957FA 14%, var(--divider-color))'},
                            {'background-color': 'var(--card-background-color)'},
                            {'border-left': '3px solid #A957FA'}
                          ],
                          'grid': [
                            {'grid-template-areas': '"kind title btn_return btn_approve" "kind meta btn_return btn_approve"'},
                            {'grid-template-columns': '36px minmax(0, 1fr) 42px 42px'},
                            {'grid-template-rows': 'min-content min-content'},
                            {'column-gap': '10px'},
                            {'row-gap': '2px'},
                            {'align-items': 'center'}
                          ],
                          'custom_fields': {
                            'kind': [
                              {'align-self': 'center'},
                              {'justify-self': 'center'}
                            ],
                            'title': [
                              {'justify-self': 'start'},
                              {'min-width': '0'},
                              {'width': '100%'},
                              {'text-align': 'left'},
                              {'font-size': '14px'},
                              {'font-weight': '700'},
                              {'line-height': '1.25'},
                              {'overflow': 'hidden'},
                              {'text-overflow': 'ellipsis'},
                              {'white-space': 'nowrap'}
                            ],
                            'meta': [
                              {'justify-self': 'start'},
                              {'min-width': '0'},
                              {'width': '100%'},
                              {'text-align': 'left'},
                              {'font-size': '11px'},
                              {'color': 'var(--secondary-text-color)'},
                              {'line-height': '1.2'},
                              {'overflow': 'hidden'},
                              {'text-overflow': 'ellipsis'},
                              {'white-space': 'nowrap'}
                            ],
                            'btn_return': [
                              {'justify-self': 'end'},
                              {'align-self': 'center'}
                            ],
                            'btn_approve': [
                              {'justify-self': 'end'},
                              {'align-self': 'center'}
                            ]
                          }
                        },
                        'custom_fields': {
                          'kind': "<div style='width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;background:rgba(169,87,250,0.08);border:1px solid rgba(169,87,250,0.24);'><ha-icon icon='" ~ item_icon ~ "' style='width:18px;height:18px;color:#A957FA;transform:translateY(-3px);'></ha-icon></div>",
                          'title': entry.chore_name | default('', true),
                          'meta': meta_text,
                          'btn_return': {
                            'card': {
                              'type': 'custom:button-card',
                              'entity': return_eid if return_eid != '' else approve_eid,
                              'icon': 'mdi:undo-variant',
                              'show_name': False,
                              'show_icon': True,
                              'tap_action': {
                                'action': 'call-service',
                                'service': 'button.press',
                                'service_data': {
                                  'entity_id': return_eid
                                }
                              },
                              'hold_action': {'action': 'more-info'},
                              'styles': {
                                'card': [
                                  {'width': '36px'},
                                  {'height': '36px'},
                                  {'border-radius': '50%'},
                                  {'background-color': 'rgba(244, 67, 54, 0.08)'},
                                  {'border': '1px solid rgba(244, 67, 54, 0.28)'},
                                  {'box-shadow': 'none'},
                                  {'display': 'flex' if return_eid != '' else 'none'}
                                ],
                                'icon': [
                                  {'width': '18px'},
                                  {'color': 'var(--error-color)'}
                                ]
                              }
                            }
                          },
                          'btn_approve': {
                            'card': {
                              'type': 'custom:button-card',
                              'entity': approve_eid if approve_eid != '' else return_eid,
                              'icon': 'mdi:check-bold',
                              'show_name': False,
                              'show_icon': True,
                              'tap_action': {
                                'action': 'call-service',
                                'service': 'button.press',
                                'service_data': {
                                  'entity_id': approve_eid
                                }
                              },
                              'hold_action': {'action': 'more-info'},
                              'styles': {
                                'card': [
                                  {'width': '36px'},
                                  {'height': '36px'},
                                  {'border-radius': '50%'},
                                  {'background-color': 'rgba(76, 175, 80, 0.10)'},
                                  {'border': '1px solid rgba(76, 175, 80, 0.30)'},
                                  {'box-shadow': 'none'},
                                  {'display': 'flex' if approve_eid != '' else 'none'}
                                ],
                                'icon': [
                                  {'width': '18px'},
                                  {'color': 'var(--success-color)'}
                                ]
                              }
                            }
                          }
                        }
                      }] -%}
                    {%- endif -%}
                  {%- endfor -%}
                  {%- for entry in pending_reward_data -%}
                    {%- set approve_eid = (entry.approve_button_eid if entry.approve_button_eid not in [None, 'None', ''] else '') | default('') -%}
                    {%- set return_eid = (entry.disapprove_button_eid if entry.disapprove_button_eid not in [None, 'None', ''] else '') | default('') -%}
                    {%- set reward_match = helper_reward_items | selectattr('name', 'eq', entry.reward_name) | list -%}
                    {%- set reward_eid = reward_match[0].eid if reward_match | count > 0 else '' -%}
                    {%- set item_icon = (state_attr(reward_eid, 'icon') if reward_eid not in ['', None, 'None'] else None) or 'mdi:gift-outline' -%}
                    {%- set requested_at_iso = state_attr(reward_eid, 'last_claimed') if reward_eid not in ['', None, 'None'] else None -%}
                    {%- set last_approved_iso = state_attr(reward_eid, 'last_approved') if reward_eid not in ['', None, 'None'] else None -%}
                    {%- set requested_at_display = (as_timestamp(requested_at_iso) | timestamp_custom('%Y-%m-%d %-I:%M%p', true)) if requested_at_iso not in ['', None, 'None'] else '' -%}
                    {%- set last_approved_display = (as_timestamp(last_approved_iso) | timestamp_custom('%Y-%m-%d', true)) if last_approved_iso not in ['', None, 'None'] else '' -%}
                    {%- set meta_text = helper_ui.get('reward_requested', 'err-reward_requested') ~ ': ' ~ requested_at_display if requested_at_display != '' else helper_ui.get('reward', 'err-reward') -%}
                    {%- if last_approved_display != '' -%}
                      {%- set meta_text = meta_text ~ ' • ' ~ helper_ui.get('last', 'err-last') ~ ': ' ~ last_approved_display -%}
                    {%- endif -%}
                    {%- if approve_eid != '' or return_eid != '' -%}
                      {%- set row_ns.cards = row_ns.cards + [{
                        'type': 'custom:button-card',
                        'entity': approve_eid if approve_eid != '' else return_eid,
                        'show_name': False,
                        'show_icon': False,
                        'show_label': False,
                        'show_state': False,
                        'tap_action': {'action': 'none'},
                        'hold_action': {'action': 'more-info'},
                        'styles': {
                          'card': [
                            {'padding': '9px 12px'},
                            {'border-radius': '14px'},
                            {'box-shadow': 'none'},
                            {'border': '1px solid color-mix(in srgb, #A957FA 14%, var(--divider-color))'},
                            {'background-color': 'var(--card-background-color)'},
                            {'border-left': '3px solid #A957FA'}
                          ],
                          'grid': [
                            {'grid-template-areas': '"kind title btn_return btn_approve" "kind meta btn_return btn_approve"'},
                            {'grid-template-columns': '36px minmax(0, 1fr) 42px 42px'},
                            {'grid-template-rows': 'min-content min-content'},
                            {'column-gap': '10px'},
                            {'row-gap': '2px'},
                            {'align-items': 'center'}
                          ],
                          'custom_fields': {
                            'kind': [
                              {'align-self': 'center'},
                              {'justify-self': 'center'}
                            ],
                            'title': [
                              {'justify-self': 'start'},
                              {'min-width': '0'},
                              {'width': '100%'},
                              {'text-align': 'left'},
                              {'font-size': '14px'},
                              {'font-weight': '700'},
                              {'line-height': '1.25'},
                              {'overflow': 'hidden'},
                              {'text-overflow': 'ellipsis'},
                              {'white-space': 'nowrap'}
                            ],
                            'meta': [
                              {'justify-self': 'start'},
                              {'min-width': '0'},
                              {'width': '100%'},
                              {'text-align': 'left'},
                              {'font-size': '11px'},
                              {'color': 'var(--secondary-text-color)'},
                              {'line-height': '1.2'},
                              {'overflow': 'hidden'},
                              {'text-overflow': 'ellipsis'},
                              {'white-space': 'nowrap'}
                            ],
                            'btn_return': [
                              {'justify-self': 'end'},
                              {'align-self': 'center'}
                            ],
                            'btn_approve': [
                              {'justify-self': 'end'},
                              {'align-self': 'center'}
                            ]
                          }
                        },
                        'custom_fields': {
                          'kind': "<div style='width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;background:rgba(169,87,250,0.08);border:1px solid rgba(169,87,250,0.24);'><ha-icon icon='" ~ item_icon ~ "' style='width:18px;height:18px;color:#A957FA;transform:translateY(-3px);'></ha-icon></div>",
                          'title': entry.reward_name | default('', true),
                          'meta': meta_text,
                          'btn_return': {
                            'card': {
                              'type': 'custom:button-card',
                              'entity': return_eid if return_eid != '' else approve_eid,
                              'icon': 'mdi:undo-variant',
                              'show_name': False,
                              'show_icon': True,
                              'tap_action': {
                                'action': 'call-service',
                                'service': 'button.press',
                                'service_data': {
                                  'entity_id': return_eid
                                }
                              },
                              'hold_action': {'action': 'more-info'},
                              'styles': {
                                'card': [
                                  {'width': '36px'},
                                  {'height': '36px'},
                                  {'border-radius': '50%'},
                                  {'background-color': 'rgba(244, 67, 54, 0.08)'},
                                  {'border': '1px solid rgba(244, 67, 54, 0.28)'},
                                  {'box-shadow': 'none'},
                                  {'display': 'flex' if return_eid != '' else 'none'}
                                ],
                                'icon': [
                                  {'width': '18px'},
                                  {'color': 'var(--error-color)'}
                                ]
                              }
                            }
                          },
                          'btn_approve': {
                            'card': {
                              'type': 'custom:button-card',
                              'entity': approve_eid if approve_eid != '' else return_eid,
                              'icon': 'mdi:check-bold',
                              'show_name': False,
                              'show_icon': True,
                              'tap_action': {
                                'action': 'call-service',
                                'service': 'button.press',
                                'service_data': {
                                  'entity_id': approve_eid
                                }
                              },
                              'hold_action': {'action': 'more-info'},
                              'styles': {
                                'card': [
                                  {'width': '36px'},
                                  {'height': '36px'},
                                  {'border-radius': '50%'},
                                  {'background-color': 'rgba(76, 175, 80, 0.10)'},
                                  {'border': '1px solid rgba(76, 175, 80, 0.30)'},
                                  {'box-shadow': 'none'},
                                  {'display': 'flex' if approve_eid != '' else 'none'}
                                ],
                                'icon': [
                                  {'width': '18px'},
                                  {'color': 'var(--success-color)'}
                                ]
                              }
                            }
                          }
                        }
                      }] -%}
                    {%- endif -%}
                  {%- endfor -%}
                  {%- set lane_card = {
                    'type': 'vertical-stack',
                    'cards': [
                      header_card,
                      {
                        'type': 'grid',
                        'columns': 1,
                        'square': False,
                        'cards': row_ns.cards
                      }
                    ]
                  } -%}
                  {%- set ns.lanes = ns.lanes + [lane_card] -%}
                {%- endif -%}
                {%- endfor -%}

                {#-- 6. Render --#}

                {%- set total_pending = ns.total_chore_pending + ns.total_reward_pending -%}
                {%- set header_collapsed = ui_root.current['header-collapse'] if has_header_collapsed_override else (false if total_pending > 0 else pref_default_header_collapsed) -%}
                {%- set header_collapsed = (header_collapsed | string | lower) == 'true' -%}
                {%- set show_summary_count = header_collapsed or total_pending == 0 -%}
                {%- set collapsed_summary = "<div style='display:flex;flex-direction:column;align-items:flex-end;justify-content:center;line-height:1;'><span style='font-size:22px;font-weight:800;'>" ~ total_pending ~ "</span><span style='margin-top:4px;font-size:10px;text-transform:uppercase;letter-spacing:0.06em;color:var(--secondary-text-color);'>" ~ ui.get('approvals', 'err-approvals') ~ "</span></div>" -%}
              {%- set summary_card = {
                'type': 'custom:button-card',
                'entity': ns.summary_helper if ns.summary_helper not in ['', None, 'None'] else None,
                'show_name': True,
                'show_label': True,
                'show_state': False,
                'show_icon': True,
                'icon': 'mdi:clipboard-check-multiple-outline',
                'icon_color': '#A957FA',
                'name': ui.get('approval_center', 'err-approval_center'),
                'label': ui.get('review_chores_and_rewards_waiting_for_approval', 'err-review_chores_and_rewards_waiting_for_approval'),
                'tap_action': ({
                  'action': 'call-service',
                  'service': 'choreops.manage_ui_control',
                  'data': {
                    'config_entry_id': integration_entry_id,
                    'user_id': dashboard_helper_user_id,
                    'ui_control_action': 'remove',
                    'key': ui_control_key_header_collapsed
                  }
                } if header_collapsed and integration_entry_id not in ['', none] and dashboard_helper_user_id not in ['', none] else {
                  'action': 'call-service',
                  'service': 'choreops.manage_ui_control',
                  'data': {
                    'config_entry_id': integration_entry_id,
                    'user_id': dashboard_helper_user_id,
                    'ui_control_action': 'update',
                    'key': ui_control_key_header_collapsed,
                    'value': true
                  }
                } if integration_entry_id not in ['', none] and dashboard_helper_user_id not in ['', none] else {
                  'action': 'none'
                }),
                'hold_action': {'action': 'more-info'} if ns.summary_helper not in ['', None, 'None'] else {'action': 'none'},
                'custom_fields': {
                  'approval_count': collapsed_summary,
                  'toggle': "<ha-icon icon='" ~ ('mdi:chevron-down' if header_collapsed else 'mdi:chevron-up') ~ "' style='width:18px;height:18px;color: var(--primary-color);'></ha-icon>"
                },
                'styles': {
                  'card': [
                    {'padding': '14px 16px'},
                    {'border-radius': '16px'},
                    {'box-shadow': 'none'},
                    {'border': ('1px solid color-mix(in srgb, var(--primary-color) ' ~ pref_primary_tint_mix_pct|string ~ '%, var(--divider-color))') if header_collapsed and pref_show_header_thin_border else 'none' if header_collapsed else '1px solid color-mix(in srgb, #A957FA 18%, var(--divider-color))'},
                    {'background-color': ('color-mix(in srgb, var(--primary-color) ' ~ pref_primary_tint_mix_pct|string ~ '%, var(--card-background-color))') if header_collapsed and pref_show_header_background else 'transparent' if header_collapsed else 'color-mix(in srgb, var(--secondary-background-color) 72%, var(--card-background-color))'}
                  ],
                  'grid': [
                    {'grid-template-areas': '"i n approval_count toggle"' if show_summary_count else '"i n toggle" "i l toggle"'},
                    {'grid-template-columns': '32px minmax(0, 1fr) auto min-content' if show_summary_count else '32px minmax(0, 1fr) min-content'},
                    {'grid-template-rows': 'min-content' if show_summary_count else 'min-content min-content'},
                    {'column-gap': '14px'},
                    {'row-gap': '2px'},
                    {'align-items': 'center'}
                  ],
                  'name': [
                    {'justify-self': 'start'},
                    {'font-size': '19px'},
                    {'font-weight': '800'},
                    {'line-height': '1.2'}
                  ],
                  'label': [
                    {'display': 'none' if show_summary_count else 'block'},
                    {'justify-self': 'start'},
                    {'font-size': '13px'},
                    {'line-height': '1.35'},
                    {'white-space': 'normal'},
                    {'color': 'var(--secondary-text-color)'}
                  ],
                  'icon': [
                    {'width': '24px'},
                    {'height': '24px'},
                    {'align-self': 'center'}
                  ],
                  'custom_fields': {
                    'approval_count': [
                      {'justify-self': 'end'},
                      {'text-align': 'right'},
                      {'line-height': '1'},
                      {'white-space': 'nowrap'},
                      {'display': 'block' if show_summary_count else 'none'},
                      {'padding': '4px 0 0 0' if show_summary_count else '0'}
                    ],
                    'toggle': [
                      {'justify-self': 'end'},
                      {'align-self': 'center'}
                    ]
                  }
                }
              } -%}

              {{ summary_card }},
              {%- if header_collapsed -%}
              {%- else -%}
                {%- for lane in ns.lanes -%}
                  {{ lane }},
                {%- endfor -%}
              {%- endif -%}
              {%- endif -%}
