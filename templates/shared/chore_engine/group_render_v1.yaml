{%- for group in button_groups -%}
	{%- set ns.group_cards = [] -%}
	{%- if group.buttons | length > 0 -%}
		{%- set g_name = group.name | replace('!!!!!!!!!!! ', '') | replace(' !!!!!!!!!!!', '') -%}
		{%- set is_overdue = 'alert' in group.icon or 'overdue' in g_name | lower -%}

		{{
			{
				'type': 'custom:button-card',
				'name': g_name,
				'icon': group.icon,
				'show_name': true,
				'show_icon': true,
				'styles': {
					'card': [
						{'background': 'rgba(244, 67, 54, 0.1)' if is_overdue else 'var(--secondary-background-color)'},
						{'box-shadow': 'none'},
						{'border': '2px solid rgba(244, 67, 54, 0.3)' if is_overdue else '2px solid var(--divider-color)'},
						{'border-radius': '6px'},
						{'padding': '6px 16px'},
						{'min-height': 'unset'},
						{'margin': '0px 0px 0px 0px'}
					],
					'grid': [
						{'grid-template-areas': '"i n"'},
						{'grid-template-columns': 'min-content 1fr'},
						{'gap': '0px'},
						{'align-items': 'center'}
					],
					'icon': [
						{'width': '18px'},
						{'color': 'var(--error-color)' if is_overdue else 'var(--primary-color)'}
					],
					'name': [
						{'justify-self': 'right'},
						{'font-size': '12px'},
						{'font-weight': '800'},
						{'text-transform': 'uppercase'},
						{'letter-spacing': '0.9px'},
						{'color': 'var(--error-color)' if is_overdue else 'var(--primary-text-color)'}
					]
				}
			}
		}},

		{%- for chore_sensor_id in group.buttons -%}
			{%- set ns.group_cards = ns.group_cards + [
				{
					'type': 'custom:button-card',
					'template': chore_row_template_name,
					'entity': chore_sensor_id,
					'variables': {
						'pref_show_chore_description': pref_show_chore_description,
						'pref_claim_accent': pref_claim_accent,
						'pref_due_accent': pref_due_accent,
						'pref_overdue_accent': pref_overdue_accent,
						'pref_steal_accent': pref_steal_accent,
						'gamification_enabled': gamification_enabled,
						'points_label': points_label,
						'points_icon': points_icon,
						'ui_labels': {
							'pending': ui.get('pending', 'err-pending'),
							'due': ui.get('due', 'err-due'),
							'claimed': ui.get('claimed', 'err-claimed'),
							'claimed_in_part': ui.get('claimed_in_part', 'err-claimed_in_part'),
							'completed': ui.get('completed', 'err-completed'),
							'completed_in_part': ui.get('completed_in_part', 'err-completed_in_part'),
							'overdue': ui.get('overdue', 'err-overdue'),
							'waiting': ui.get('waiting', 'err-waiting'),
							'missed': ui.get('missed', 'err-missed'),
							'completed_by_other': ui.get('completed_by_other', 'err-completed_by_other'),
							'not_my_turn': ui.get('not_my_turn', 'err-not_my_turn'),
							'missed_locked': ui.get('missed_locked', 'err-missed_locked'),
							'steal_available': ui.get('steal_available', 'err-steal_available'),
							'date': ui.get('date', 'err-date'),
							'due_date': ui.get('due_date', 'err-due_date'),
							'steal_window_open': ui.get('steal_window_open', 'err-steal_window_open'),
							'current_turn': ui.get('current_turn', 'err-current_turn'),
							'currently': ui.get('currently', 'err-currently'),
							'available_in': ui.get('available_in', 'err-available_in'),
							'overdue_in': ui.get('overdue_in', 'err-overdue_in'),
							'progress': ui.get('progress', 'err-progress'),
							'by': ui.get('by', 'err-by'),
							'last': ui.get('last', 'err-last'),
							'never': ui.get('never', 'err-never'),
							'daily': ui.get('daily', 'err-daily'),
							'daily_multi': ui.get('daily_multi', 'err-daily_multi'),
							'weekly': ui.get('weekly', 'err-weekly'),
							'biweekly': ui.get('biweekly', 'err-biweekly'),
							'monthly': ui.get('monthly', 'err-monthly'),
							'quarterly': ui.get('quarterly', 'err-quarterly'),
							'yearly': ui.get('yearly', 'err-yearly'),
							'custom': ui.get('custom', 'err-custom'),
							'custom_from_complete': ui.get('custom_from_complete', 'err-custom_from_complete'),
							'custom_1_week': ui.get('custom_1_week', 'err-custom_1_week'),
							'custom_1_month': ui.get('custom_1_month', 'err-custom_1_month'),
							'custom_1_quarter': ui.get('custom_1_quarter', 'err-custom_1_quarter'),
							'custom_1_year': ui.get('custom_1_year', 'err-custom_1_year')
						}
					}
				}
			] -%}
		{%- endfor -%}

		{%- if pref_chore_engine_layout_mode == 'responsive' -%}
			{{
				{
					'type': 'vertical-stack',
					'cards': [
						{
							'type': 'conditional',
							'conditions': [
								{
									'condition': 'screen',
									'media_query': '(max-width: 768px)'
								}
							],
							'card': {
								'type': 'grid',
								'columns': effective_column_count_mobile,
								'square': false,
								'cards': ns.group_cards
							}
						},
						{
							'type': 'conditional',
							'conditions': [
								{
									'condition': 'screen',
									'media_query': '(min-width: 769px)'
								}
							],
							'card': {
								'type': 'grid',
								'columns': effective_column_count_wide,
								'square': false,
								'cards': ns.group_cards
							}
						}
					]
				}
			}},
		{%- else -%}
			{{
				{
					'type': 'grid',
					'columns': effective_column_count,
					'square': false,
					'cards': ns.group_cards
				}
			}},
		{%- endif -%}
	{%- endif -%}
{%- endfor -%}
