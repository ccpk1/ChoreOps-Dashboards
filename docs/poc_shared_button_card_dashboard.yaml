title: ChoreOps Shared-Template PoC
button_card_templates:
  choreops_chore_row:
    show_name: true
    show_icon: true
    tap_action:
      action: more-info
    styles:
      card:
        - padding: 6px 8px
        - border-radius: 10px
      grid:
        - grid-template-areas: '"i n action" "i due action" "i history action"'
        - grid-template-columns: 30px 1fr min-content
        - grid-template-rows: min-content min-content min-content
        - row-gap: 0px
        - column-gap: 8px
        - align-items: center
      name:
        - justify-self: start
        - font-weight: 600
        - font-size: 14px
      icon:
        - width: 28px
        - color: >-
            [[[ if (['overdue', 'missed'].includes(entity.state)) return
            '#ff4444';
                if (entity.state === 'due') return '#ff9800';
                if (entity.state === 'claimed') return '#a957fa';
                if (entity.state === 'completed') return 'var(--success-color)';
                return 'var(--primary-text-color)'; ]]]
      custom_fields:
        due:
          - justify-self: start
          - font-size: 11px
        history:
          - justify-self: start
          - font-size: 10px
          - color: var(--secondary-text-color)
        action:
          - align-self: center
          - justify-self: end
    custom_fields:
      due: |-
        [[[ const due = entity.attributes.due_date;
            const txt = due ? new Date(due).toLocaleString(undefined, {month:'short', day:'numeric', hour:'numeric', minute:'2-digit'}) : '--';
            return `<b>${String(entity.state).toUpperCase()}</b> • Due: ${txt}`; ]]]
      history: |-
        [[[ const last = entity.attributes.last_completed;
            const lastTxt = last ? new Date(last).toLocaleDateString(undefined, {month:'short', day:'numeric'}) : 'Never';
            return `Last: ${lastTxt}`; ]]]
      action:
        card:
          type: custom:button-card
          entity: "[[[ return entity.entity_id; ]]]"
          show_name: false
          show_icon: true
          icon: |-
            [[[ if (entity.state === 'claimed') return 'mdi:check-all';
                if (entity.state === 'completed') return 'mdi:check';
                if (entity.state === 'overdue') return 'mdi:alert-octagon';
                return 'mdi:arrow-right'; ]]]
          styles:
            card:
              - width: 34px
              - height: 34px
              - border-radius: 50%
              - box-shadow: none
            icon:
              - width: 20px
          tap_action:
            action: |-
              [[[ const canClaim = entity.attributes.can_claim === true;
                  if ((!canClaim && entity.state !== 'claimed') || entity.state === 'completed') return 'none';
                  return 'call-service'; ]]]
            service: button.press
            service_data:
              entity_id: >-
                [[[ if (entity.state === 'claimed') return
                entity.attributes.approve_button_eid;
                    return entity.attributes.claim_button_eid; ]]]
views:
  - title: Shared Template PoC
    path: shared-template-poc
    cards:
      - type: custom:auto-entities
        card:
          type: grid
          columns: 1
          square: false
        card_param: cards
        filter:
          template: |-
            {%- set fallback_name = 'Zoë' -%}

            {%- set name = fallback_name -%}

            {%- set user_id = 'c994a0fa-47bc-48b9-8946-df49cb8e9375' -%}

            {%- set entry_id = '01KJTE9M4P2AEJR20M0N597KMW' -%}

            {%- set lookup_key = entry_id ~ ':' ~ user_id -%}

            {%- if not (use_override_dashboard_helper | default(false,
            true)) -%}
              {%- set helper = integration_entities('choreops')
                  | select('search', '^sensor\\.')
                  | list
                  | expand
                  | selectattr('attributes.purpose', 'defined')
                  | selectattr('attributes.purpose', 'eq', 'purpose_dashboard_helper')
                  | selectattr('attributes.dashboard_lookup_key', 'eq', lookup_key)
                  | map(attribute='entity_id')
                  | first
                  | default("err-dashboard_helper_missing", true) -%}
            {%- endif -%}
            {%- if helper == '' -%}
              {{ {'type':'markdown','content':'No ChoreOps helper found'} }},
            {%- else -%}
              {%- for chore in state_attr(helper, 'chores') | default([], true) -%}
                {{ {
                  'type': 'custom:button-card',
                  'template': 'choreops_chore_row',
                  'entity': chore.eid
                } }},
              {%- endfor -%}
            {%- endif -%}
